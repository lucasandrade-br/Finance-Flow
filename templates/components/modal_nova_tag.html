<!-- Modal para Criar Nova Tag (Reutilizável) -->
<div id="modalNovaTag" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 p-4" style="display: none;">
  <section class="glass-panel w-full max-w-md rounded-[28px] p-6 shadow-2xl shadow-black/20">
    <div class="mb-6">
      <h2 class="text-2xl font-bold text-white">Nova Tag</h2>
      <p class="mt-1 text-sm text-slate-400">Crie uma tag para categorizar suas transações.</p>
    </div>

    <form id="formNovaTag" class="space-y-4">
      {% csrf_token %}


      <div>
        <label for="nomeTag" class="mb-2 block text-xs font-semibold uppercase tracking-[0.2em] text-slate-400">Nome da Tag</label>
        <input
          id="nomeTag"
          name="nome"
          type="text"
          required
          autocomplete="off"
          class="w-full rounded-2xl border border-white/10 bg-darkbg px-4 py-3 text-sm text-white outline-none transition focus:border-neonprimary/40"
          placeholder="Ex.: Urgente, Saúde, Casa"
        />
      </div>

      <div>
        <label for="planoContaTag" class="mb-2 block text-xs font-semibold uppercase tracking-[0.2em] text-slate-400">Plano de Conta (Opcional)</label>
        <select id="planoContaTag" name="plano_conta_id" class="w-full rounded-2xl border border-white/10 bg-darkbg px-4 py-3 text-sm text-white outline-none transition focus:border-neonprimary/40">
          <option value="">Nenhum</option>
          {% for plano in plano_contas %}
            <option value="{{ plano.id }}">{{ plano.codigo }} - {{ plano.nome }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label for="corHexTag" class="mb-2 block text-xs font-semibold uppercase tracking-[0.2em] text-slate-400">Cor (Opcional)</label>
        <input id="corHexTag" name="cor_hexadecimal" type="color" class="h-10 w-16 rounded-lg border border-white/10 bg-darkbg p-0" value="#10b981" />
      </div>

      <div id="feedbackNovaTag" class="hidden rounded-2xl p-3" role="alert">
        <p id="feedbackText" class="text-sm font-medium"></p>
      </div>

      <div class="flex items-center justify-end gap-3 pt-2">
        <button
          type="button"
          id="btnCancelarTag"
          class="inline-flex items-center rounded-2xl border border-white/10 bg-white/5 px-4 py-2 text-sm font-medium text-slate-300 transition hover:border-white/20 hover:bg-white/10"
        >
          Cancelar
        </button>
        <button
          type="submit"
          id="btnSalvarTag"
          class="inline-flex items-center rounded-2xl bg-neonprimary px-5 py-2 text-sm font-semibold text-slate-950 transition hover:brightness-110"
        >
          Criar Tag
        </button>
      </div>
    </form>
  </section>
</div>

<style>
  #modalNovaTag .select2-container--default .select2-selection--single {
    background-color: #000000 !important;
    border: 1px solid rgba(255,255,255,0.10) !important;
    border-radius: 1rem !important;
    height: auto;
    min-height: 48px;
    padding: 0.35rem 1rem;
    display: flex;
    align-items: center;
    transition: border 0.2s;
  }

  #modalNovaTag .select2-container--default.select2-container--focus .select2-selection--single {
    border-color: #10b981 !important;
  }

  #modalNovaTag .select2-container--default .select2-selection--single .select2-selection__rendered {
    color: #fff !important;
    padding-left: 0;
    padding-right: 20px;
    font-size: 0.875rem;
    line-height: normal;
  }

  #modalNovaTag .select2-container--default .select2-selection--single .select2-selection__arrow {
    height: 100%;
    right: 1rem;
  }

  #modalNovaTag .select2-dropdown {
    background-color: #090a0e !important;
    border-radius: 1rem !important;
    border: 1px solid rgba(255,255,255,0.10) !important;
    color: #fff !important;
    box-shadow: 0 4px 24px 0 #0005;
  }

  #modalNovaTag .select2-results__option {
    color: #fff !important;
    padding: 0.75rem 1rem;
    border-radius: 0.5rem;
    font-size: 0.95rem;
  }

  #modalNovaTag .select2-container--default .select2-results__option--highlighted.select2-results__option--selectable,
  #modalNovaTag .select2-container--default .select2-results__option--highlighted[aria-selected] {
    background-color: #10b981 !important;
    color: #0d0e11 !important;
  }
</style>

<script>
  // Funções para gerenciar o modal de nova tag (compartilhadas)
  const modalNovaTag = document.getElementById('modalNovaTag');
  const formNovaTag = document.getElementById('formNovaTag');
  const nomeTagInput = document.getElementById('nomeTag');
  const planoContaTag = document.getElementById('planoContaTag');
  const btnCancelarTag = document.getElementById('btnCancelarTag');
  const feedbackDiv = document.getElementById('feedbackNovaTag');
  const feedbackText = document.getElementById('feedbackText');

  function inicializarPlanoContaTagSelect2() {
    if (!window.jQuery || !window.jQuery.fn || !window.jQuery.fn.select2 || !planoContaTag) {
      return false;
    }
    if (!window.jQuery(planoContaTag).hasClass('select2-hidden-accessible')) {
      window.jQuery(planoContaTag).select2({
        theme: 'default',
        width: '100%',
        placeholder: 'Selecione uma opção...',
        allowClear: true,
        dropdownParent: window.jQuery('#modalNovaTag'),
      });
    }
    return true;
  }

  function abrirModalNovaTag(planoContaId = '') {
    inicializarPlanoContaTagSelect2();
    formNovaTag.reset();
    feedbackDiv.classList.add('hidden');
    // Se vier planoContaId, seleciona no select
    if (planoContaId) {
      planoContaTag.value = planoContaId;
    } else {
      planoContaTag.value = '';
    }
    if (inicializarPlanoContaTagSelect2() && window.jQuery(planoContaTag).hasClass('select2-hidden-accessible')) {
      window.jQuery(planoContaTag).trigger('change.select2');
    }
    nomeTagInput.focus();
    modalNovaTag.style.display = 'flex';
  }

  function fecharModalNovaTag() {
    modalNovaTag.style.display = 'none';
    formNovaTag.reset();
    if (inicializarPlanoContaTagSelect2() && window.jQuery(planoContaTag).hasClass('select2-hidden-accessible')) {
      window.jQuery(planoContaTag).val('').trigger('change.select2');
    }
    feedbackDiv.classList.add('hidden');
  }

  // Fechar ao clicar no botão Cancelar
  btnCancelarTag.addEventListener('click', fecharModalNovaTag);

  // Fechar ao clicar fora do modal
  modalNovaTag.addEventListener('click', function (e) {
    if (e.target === modalNovaTag) {
      fecharModalNovaTag();
    }
  });

  // Submeter formulário
  formNovaTag.addEventListener('submit', async function (e) {
    e.preventDefault();

    const nome = nomeTagInput.value.trim();
    const planoContaId = planoContaTag.value;
    const corHex = document.getElementById('corHexTag').value;

    if (!nome) {
      exibirFeedback('Nome é obrigatório', 'error');
      return;
    }

    try {
      const formData = new FormData();
      formData.append('nome', nome);
      if (planoContaId) {
        formData.append('plano_conta_id', planoContaId);
      }
      if (corHex) {
        formData.append('cor_hexadecimal', corHex);
      }
      // CSRF token
      formData.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);

      const response = await fetch('{% url "contas:criar_tag_ajax" %}', {
        method: 'POST',
        body: formData,
      });

      const data = await response.json();

      if (response.ok) {
        exibirFeedback(data.message || 'Tag criada com sucesso!', 'success');
        setTimeout(() => {
          fecharModalNovaTag();
          // Dispara evento customizado para notificar o Select2
          window.dispatchEvent(new CustomEvent('tagCriada', { detail: { id: data.id, text: data.text, plano_conta_id: data.plano_conta_id } }));
        }, 1000);
      } else {
        exibirFeedback(data.error || 'Erro ao criar tag', 'error');
      }
    } catch (error) {
      exibirFeedback('Erro de conexão: ' + error.message, 'error');
    }
  });

  function exibirFeedback(mensagem, tipo) {
    feedbackDiv.classList.remove('hidden', 'bg-green-500/10', 'bg-red-500/10', 'text-green-300', 'text-red-300');
    feedbackDiv.classList.add(tipo === 'success' ? 'bg-green-500/10' : 'bg-red-500/10');
    feedbackText.classList.remove('text-green-300', 'text-red-300');
    feedbackText.classList.add(tipo === 'success' ? 'text-green-300' : 'text-red-300');
    feedbackText.textContent = mensagem;
  }
</script>
